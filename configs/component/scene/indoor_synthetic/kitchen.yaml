relighting_cfg:
  flying_sphere_paper:
    lighting_cfg:
      type: 'sphere'
      emitter:
        type: 'area'
        radiance:
          type: 'rgb'
          value: [53., 50., 45.]
      bsdf:
        type: 'diffuse'
        reflectance:
          type: 'rgb'
          value: [0.0, 0.0, 0.0]
    interpolation:
      _target_: iif.component.rendering.lighting.flying_sphere.FlyingSphereLightingTrajectory
      positions:
        - [-1., 1.5, -1.4]
        - [-1., 1.5, 0.8]
      size: 0.15
      frames_per_segment: 
        - 10
  flying_sphere:
    lighting_cfg:
      lighting_sphere:
        type: 'sphere'
        emitter:
          type: 'area'
          radiance:
            type: 'rgb'
            value: [53., 50., 45.]
        bsdf:
          type: 'diffuse'
          reflectance:
            type: 'rgb'
            value: [0.0, 0.0, 0.0]
    interpolation:
      lighting_sphere:
        _target_: iif.component.rendering.lighting.flying_sphere.FlyingSphereLightingTrajectory
        positions:
          - [-1., 1.5, -1.4]
          - [-1., 1.5, 0.8]
        size: 0.2
        frames_per_segment: 
          - 90