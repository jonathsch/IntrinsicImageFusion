_target_: iif.utils.config.native_dict
_recursive_: false
_convert_: object

input:
  scene_type: indoor_synthetic
  scene_name: kitchen
  scene_postfix: ""
  root: ${paths.data_dir}/${.scene_type}/${.scene_name}
  folder_path: ${.root}/train/Image 
  num_segments: 5018
  num_objects: 91
  scene_path: ${.root}/scene.obj
  poses: transforms.json
  res_scale: 1.
  subsampling_factor: 1

output:
  scene_name: ${..input.scene_name}${..input.scene_postfix}
  folder_path: ${paths.out_dir}/${..input.scene_type}/${..input.scene_name}/train

dataset_cfg:
  ray_based_target: iif.component.datamodule.dataset.fipt_synthetic.FIPTSyntheticRayDataset
  image_based_target: iif.component.datamodule.dataset.fipt_synthetic.FIPTSyntheticDataset
  root: ${..input.root}
  transforms_file: ${..input.poses}
  res_scale: ${..input.res_scale}
  subsampling_factor: ${..input.subsampling_factor}
  transform: 
    _target_: iif.component.datamodule.transform.batch_transform.BatchTransform
    transform:
      rays: null
      exposure: null
      index: null
      crf: null
      path: null
      _default:
        _target_: iif.component.datamodule.transform.compose.Compose
        transforms:
          t0:
            _target_: iif.component.datamodule.transform.totensor.ToTensor

vis_cfg:
  fov: 85.0
  log_indices: 
    - 1
    - 10

supp_cfg:
  fov: 85.0

